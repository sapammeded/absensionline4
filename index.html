<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GIP FIX</title>
    <style>
        body { background: #0a0a0a; color: #00ff9d; font-family: monospace; padding: 16px; }
        button { background: #ff0055; color: white; padding: 18px; border: none; border-radius: 60px; width: 100%; margin: 15px 0; font-size: 1.3rem; }
        button:disabled { background: #444; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; background: #050505; border: 1px solid #00ff9d; color: #00ff9d; border-radius: 30px; }
        video { width: 100%; height: 320px; object-fit: cover; transform: scaleX(-1); border: 3px solid #ff0055; border-radius: 16px; }
        .log-console { background: #010a0c; height: 300px; overflow-y: auto; padding: 8px; font-size: 0.7rem; border-radius: 12px; margin-top: 15px; }
        .flex-row { display: flex; gap: 10px; margin: 10px 0; }
        .gps-fixed { position: fixed; bottom: 10px; right: 10px; background: #000; padding: 6px 12px; border-radius: 20px; font-size: 0.6rem; border: 1px solid #00ff9d; }
    </style>
</head>
<body>
<div style="max-width:600px;margin:0 auto;background:#111;border:2px solid #00ff9d;border-radius:24px;padding:20px;">
    <h1>⚡ GIP FIX ⚡</h1>
    <div><span id="sysStatus">🔴 INIT</span> | <span id="qrStatus">QR:--</span> | <span id="gpsStatus">GPS:--</span></div>
    <div id="qrContainer" style="margin:10px 0;"></div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <input type="text" id="userName" placeholder="NAMA">
    <select id="locationSelect"></select>
    <button id="absenBtn" disabled>MENUNGGU</button>
    <div id="logArea" class="log-console"></div>
</div>
<div class="gps-fixed" id="gpsIndicator">📍0%</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
const API_BASE = "https://absensionline2.sapammeded.workers.dev";
const MASTER_KEY = "GIP_ETERNAL_MASTER_KEY_2024";

let gps = null, qrId = null, nonce = null, fp = null, isBusy = false;
let geoWatch = null, stream = null;

const $ = id => document.getElementById(id);
const log = (msg, err) => { const d = document.createElement('div'); d.style.color = err ? '#ff0055' : '#00ff9d'; d.innerHTML = `> ${new Date().toLocaleTimeString()} → ${msg}`; $('logArea').appendChild(d); $('logArea').scrollTop = $('logArea').scrollHeight; console.log(msg); };

async function genFP() {
    const data = [navigator.userAgent, screen.width, screen.height, new Date().getTimezoneOffset()].join('|');
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,32);
}

async function hmac(msg) {
    const key = await crypto.subtle.importKey('raw', new TextEncoder().encode(MASTER_KEY), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
    const sig = await crypto.subtle.sign('HMAC', key, new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('').toLowerCase();
}

async function capture() {
    const v = $('video');
    if (!v.videoWidth) throw new Error('Camera not ready');
    const c = $('canvas');
    c.width = 480; c.height = 360;
    const ctx = c.getContext('2d');
    ctx.save();
    ctx.translate(c.width, 0);
    ctx.scale(-1,1);
    ctx.drawImage(v, 0, 0, c.width, c.height);
    ctx.restore();
    const base64 = c.toDataURL('image/jpeg', 0.5);
    const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(base64));
    const photoHash = Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
    return { hash: photoHash, base64 };
}

async function refreshQR() {
    try {
        const res = await fetch(API_BASE + '/api/qr-token');
        const data = await res.json();
        qrId = data.qrId;
        $('qrContainer').innerHTML = '';
        new QRCode($('qrContainer'), { text: qrId, width: 120, height: 120 });
        $('qrStatus').innerHTML = 'QR:OK';
        log(`QR: ${qrId.slice(0,16)}`);
    } catch(e) { log(`QR error: ${e.message}`, true); qrId = null; }
}

async function refreshNonce() {
    try {
        const res = await fetch(API_BASE + '/api/challenge');
        const data = await res.json();
        nonce = data.nonce;
        log(`Nonce: ${nonce.slice(0,16)}`);
    } catch(e) { log(`Nonce error: ${e.message}`, true); nonce = null; }
}

async function loadLocs() {
    try {
        const res = await fetch(API_BASE + '/api/locations');
        const locs = await res.json();
        const sel = $('locationSelect');
        sel.innerHTML = '<option value="">-- Pilih --</option>';
        locs.forEach(l => { sel.innerHTML += `<option value='${l.id}'>${l.name} (${l.radius}m)</option>`; });
        log(`${locs.length} lokasi loaded`);
    } catch(e) { log(`Loc error: ${e.message}`, true); }
}

function initGPS() {
    if (!navigator.geolocation) return;
    if (geoWatch) navigator.geolocation.clearWatch(geoWatch);
    geoWatch = navigator.geolocation.watchPosition(
        (p) => { gps = p; const acc = p.coords.accuracy; $('gpsStatus').innerHTML = `GPS:${acc.toFixed(0)}m`; $('gpsIndicator').innerHTML = `GPS:${Math.min(100,Math.max(0,Math.round(100-acc)))}%`; if(acc<50 && qrId && nonce && fp) { $('absenBtn').disabled=false; $('absenBtn').innerHTML='✅ ABSEN'; $('sysStatus').innerHTML='🟢 READY'; } },
        (e) => log(`GPS error: ${e.message}`, true),
        { enableHighAccuracy: true, timeout: 10000 }
    );
}

async function initCamera() {
    try {
        if(stream) stream.getTracks().forEach(t=>t.stop());
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        $('video').srcObject = stream;
        log('Camera OK');
    } catch(e) { log(`Camera error: ${e.message}`, true); throw e; }
}

async function submit() {
    if(isBusy) return;
    const name = $('userName').value.trim();
    const locId = $('locationSelect').value;
    if(!name) return alert('Nama kosong');
    if(!locId) return alert('Pilih lokasi');
    if(!gps) return alert('Tunggu GPS');
    if(gps.coords.accuracy > 50) return alert(`GPS accuracy ${gps.coords.accuracy.toFixed(0)}m > 50m`);
    if(!qrId || !nonce || !fp) return alert('System not ready');

    isBusy = true;
    const btn = $('absenBtn');
    btn.disabled = true;
    btn.innerHTML = 'PROSES...';
    log('Starting...');

    try {
        const photo = await capture();
        log(`Photo hash: ${photo.hash.slice(0,16)}`);

        const ts = Date.now();
        const lat = gps.coords.latitude.toFixed(6);
        const lng = gps.coords.longitude.toFixed(6);

        const raw = `${nonce}|${lat}|${lng}|${fp}|${photo.hash}|${ts}`;
        const sig = await hmac(raw);
        log(`Sig: ${sig.slice(0,32)}`);

        const payload = {
            qrId, nonce, nama: name.toUpperCase(),
            lat: parseFloat(lat), lng: parseFloat(lng),
            accuracy: gps.coords.accuracy, mocked: false,
            locationId: locId, fingerprint: fp,
            photoHash: photo.hash, photoBase64: photo.base64,
            timestamp: ts
        };

        const res = await fetch(API_BASE + '/api/absen', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-GIP-Signature': sig },
            body: JSON.stringify(payload)
        });

        const text = await res.text();
        log(`Response ${res.status}: ${text}`);

        if(res.ok) {
            alert('✅ ABSEN BERHASIL!');
            location.reload();
        } else {
            alert(`GAGAL: ${text}`);
        }
    } catch(e) {
        log(`Error: ${e.message}`, true);
        alert(e.message);
    } finally {
        isBusy = false;
        btn.disabled = false;
        btn.innerHTML = '✅ ABSEN';
    }
}

async function boot() {
    log('Booting...');
    fp = await genFP();
    log(`FP: ${fp.slice(0,16)}`);
    await initCamera();
    initGPS();
    await refreshQR();
    await refreshNonce();
    await loadLocs();
    setInterval(refreshQR, 290000);
    setInterval(refreshNonce, 170000);
    log('Ready');
}

window.onload = boot;
$('absenBtn').onclick = submit;
</script>
</body>
    </html>
